<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Content Hub · Cícero Comunicación</title>
<style>
  :root{--purple:#17004C;--blue:#3570B8;--orange:#EC8431;--gray:#F4F6FB;--border:#E2E8F0;--text:#17004C;--muted:#6B7A99}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray);color:var(--text);min-height:100vh}
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--purple) 0%,var(--blue) 60%,var(--orange) 100%)}
  .login-box{background:white;border-radius:24px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(23,0,76,.35)}
  .login-logo{text-align:center;margin-bottom:32px}
  .cicero-wordmark{font-size:38px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .login-logo .sub{font-size:13px;color:var(--muted);margin-top:6px;font-weight:500}
  .login-logo .hub-label{display:inline-block;background:linear-gradient(135deg,var(--orange),#f5a05a);color:white;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;margin-top:8px;letter-spacing:.5px}
  .field{margin-bottom:18px}
  .field label{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;letter-spacing:.6px;text-transform:uppercase}
  .field input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;font-family:inherit;color:var(--text)}
  .field input:focus{border-color:var(--blue)}
  .btn-login{width:100%;background:linear-gradient(135deg,var(--purple),var(--blue));color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
  .btn-login:hover{opacity:.9}
  .login-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
  #app-screen{display:none;min-height:100vh}
  header{background:linear-gradient(135deg,var(--purple) 0%,var(--blue) 55%,var(--orange) 100%);padding:0 36px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(23,0,76,.3)}
  .h-wordmark{font-size:22px;font-weight:900;color:white;letter-spacing:-.5px}
  .h-right{display:flex;align-items:center;gap:14px}
  .user-chip{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:30px;padding:5px 14px 5px 5px}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#f5a05a);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:white}
  .user-name{color:rgba(255,255,255,.85);font-size:13px;font-weight:600}
  .btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-logout:hover{background:rgba(255,255,255,.2);color:white}
  .main{max-width:1080px;margin:0 auto;padding:40px 24px}
  .welcome{margin-bottom:36px}
  .welcome h1{font-size:26px;font-weight:800;color:var(--purple);margin-bottom:6px}
  .welcome p{color:var(--muted);font-size:14px}
  .section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--border)}
  .client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;margin-bottom:48px}
  .client-card{background:white;border-radius:18px;border:1.5px solid var(--border);box-shadow:0 2px 12px rgba(23,0,76,.06);overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative}
  .client-card:hover:not(.coming-soon){transform:translateY(-3px);box-shadow:0 10px 32px rgba(23,0,76,.13)}
  .client-card.coming-soon{cursor:default}
  .card-stripe{height:5px}
  .card-body{padding:20px 22px 18px}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
  .card-icon-wrap{display:flex;align-items:center;gap:12px}
  .card-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .card-name{font-size:15px;font-weight:800;color:var(--purple);line-height:1.2}
  .card-sector{font-size:12px;color:var(--muted);margin-top:3px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
  .badge-active{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7}
  .badge-soon{background:#FFF8E1;color:#F57F17;border:1px solid #FFE082}
  .channels-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .ch-pill{font-size:11px;border-radius:20px;padding:3px 10px;font-weight:600;border:1px solid}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
  .card-footer-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .status-dot{width:7px;height:7px;border-radius:50%}
  .btn-open{background:linear-gradient(135deg,var(--purple),var(--blue));color:white;border:none;border-radius:9px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-open:hover{opacity:.85}
  .cs-overlay{position:absolute;inset:0;background:rgba(255,255,255,.82);display:flex;align-items:center;justify-content:center;border-radius:18px;backdrop-filter:blur(2px)}
  .cs-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.4px}
  @media(max-width:640px){.main{padding:20px 16px}header{padding:0 16px}.client-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="cicero-wordmark">Cícero</div>
      <div class="sub">Comunicación · Salud</div>
      <div class="hub-label">CONTENT HUB</div>
    </div>
    <div id="login-error" class="login-error">Usuario o contraseña incorrectos.</div>
    <div class="field"><label>Usuario</label><input type="text" id="inp-user" placeholder="tu usuario" autocomplete="username"/></div>
    <div class="field"><label>Contraseña</label><input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn-login" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="h-wordmark">Cícero</div>
    <div style="position:absolute;left:50%;transform:translateX(-50%);text-align:center">
      <div style="color:white;font-size:15px;font-weight:800">Content Hub</div>
      <div style="color:rgba(255,255,255,.65);font-size:12px">Generador de contenidos · Salud</div>
    </div>
    <div class="h-right">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar"></div>
        <span class="user-name" id="user-name-display"></span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="main">
    <div class="welcome">
      <h1 id="welcome-title"></h1>
      <p>Selecciona un cliente para generar su plan de contenidos.</p>
    </div>
    <div class="section-label">Clientes</div>
    <div class="client-grid" id="client-grid"></div>
  </div>
</div>

<script>
const USERS=[
  {id:"admin",pass:"admin2026",role:"admin",name:"Administrador"},
  {id:"editor",pass:"editor2026",role:"editor",name:"Copywriter"}
];

const CLIENTS=[
  {id:"servier",name:"Servier España",sector:"Cardiovascular · Oncología · Venosa",icon:"💊",iconBg:"#FEF2F2",stripe:"linear-gradient(90deg,#C0392B,#E74C3C)",channels:["X/Twitter","Instagram","LinkedIn"],channelColors:["#000","#E1306C","#0077B5"],ready:true,url:"servier.html"},
  {id:"ibsa",name:"IBSA Iberia",sector:"Fertilidad · Osteoarticular · Dermoestética",icon:"💎",iconBg:"#EEF2FF",stripe:"linear-gradient(90deg,#3730A3,#6366F1)",channels:["LinkedIn"],channelColors:["#0077B5"],ready:true,url:"ibsa.html"},
  {id:"servier-venosa",name:"Área Venosa Servier",sector:"Piernas cansadas · Varices · Hemorroides",icon:"🦵",iconBg:"#EFF8FF",stripe:"linear-gradient(90deg,#1a3a5c,#2980B9)",channels:["Instagram","Facebook"],channelColors:["#E1306C","#1877F2"],ready:true,url:"servier-venosa.html"},
  {id:"csl",name:"CSL Vifor",sector:"Nefrología · Hematología · Enfermedades raras",icon:"🔬",iconBg:"#FEF2F2",stripe:"linear-gradient(90deg,#AA0000,#CC0000)",channels:["X/Twitter","Instagram"],channelColors:["#000","#E1306C"],ready:true,url:"csl-vifor.html"},
  {id:"charrua",name:"Antonio Charrua · CSL Iberia",sector:"Liderazgo · Salud · Innovación",icon:"👤",iconBg:"#FEF2F2",stripe:"linear-gradient(90deg,#AA0000,#CC0000)",channels:["LinkedIn","X/Twitter"],channelColors:["#0077B5","#000"],ready:true,url:"csl-charrua.html"},
  {id:"daiichi",name:"Daiichi Sankyo",sector:"Oncología",icon:"🧬",iconBg:"#F0FDF4",stripe:"linear-gradient(90deg,#15803d,#22c55e)",channels:["X/Twitter","LinkedIn"],channelColors:["#000","#0077B5"],ready:false},
  {id:"idorsia",name:"Idorsia",sector:"Cardiología",icon:"❤️",iconBg:"#FFF7ED",stripe:"linear-gradient(90deg,#C2410C,#F97316)",channels:["LinkedIn","Instagram"],channelColors:["#0077B5","#E1306C"],ready:false},
  {id:"jnj",name:"Johnson & Johnson",sector:"Salud · Multidivisión",icon:"⚕️",iconBg:"#FFFBEB",stripe:"linear-gradient(90deg,#B45309,#F59E0B)",channels:["X/Twitter","Instagram","LinkedIn"],channelColors:["#000","#E1306C","#0077B5"],ready:false},
];

let currentUser=null;

function doLogin(){
  const u=document.getElementById("inp-user").value.trim().toLowerCase();
  const p=document.getElementById("inp-pass").value;
  const user=USERS.find(x=>x.id===u&&x.pass===p);
  if(!user){document.getElementById("login-error").style.display="block";return;}
  currentUser=user;
  localStorage.setItem("ch_session",JSON.stringify({id:user.id,ts:Date.now()}));
  showApp();
}

function doLogout(){
  localStorage.removeItem("ch_session");
  currentUser=null;
  document.getElementById("app-screen").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("inp-pass").value="";
  document.getElementById("login-error").style.display="none";
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&document.getElementById("login-screen").style.display!=="none") doLogin();
});

window.addEventListener("load",()=>{
  try{
    const s=JSON.parse(localStorage.getItem("ch_session")||"null");
    if(s&&Date.now()-s.ts<8*3600*1000){
      const user=USERS.find(x=>x.id===s.id);
      if(user){currentUser=user;showApp();return;}
    }
  }catch(_){}
});

function showApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app-screen").style.display="block";
  const av=currentUser.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("user-avatar").textContent=av;
  document.getElementById("user-name-display").textContent=currentUser.name;
  document.getElementById("welcome-title").textContent=`Hola, ${currentUser.name} 👋`;
  renderClientGrid();
}

function renderClientGrid(){
  const grid=document.getElementById("client-grid");
  grid.innerHTML="";
  CLIENTS.forEach(c=>{
    const card=document.createElement("div");
    card.className="client-card"+(c.ready?"":" coming-soon");
    const channels=c.channels.map((ch,i)=>`<span class="ch-pill" style="color:${c.channelColors[i]};background:${c.channelColors[i]}11;border-color:${c.channelColors[i]}33">${ch}</span>`).join("");
    card.innerHTML=`<div class="card-stripe" style="background:${c.stripe}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-icon-wrap">
            <div class="card-icon" style="background:${c.iconBg}">${c.icon}</div>
            <div><div class="card-name">${c.name}</div><div class="card-sector">${c.sector}</div></div>
          </div>
          <span class="${c.ready?"badge-active":"badge-soon"} badge">${c.ready?"● Activo":"● Pronto"}</span>
        </div>
        <div class="channels-row">${channels}</div>
        <div class="card-footer">
          <div class="card-footer-meta"><span class="status-dot" style="background:${c.ready?"#4CAF50":"#FFA726"}"></span>${c.ready?"Disponible":"En desarrollo"}</div>
          ${c.ready?`<button class="btn-open" onclick="openClient('${c.url}')">Abrir →</button>`:`<span style="font-size:11px;color:var(--muted);font-weight:600">Próximamente</span>`}
        </div>
      </div>
      ${!c.ready?`<div class="cs-overlay"><span class="cs-label">PRÓXIMAMENTE</span></div>`:""}`;
    grid.appendChild(card);
  });
}

function openClient(url){window.location.href=url;}
</script>
</body>
</html>
