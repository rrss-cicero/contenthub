<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Área Venosa Servier · Content Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{--navy:#1a3a5c;--navy2:#2980B9;--accent:#3b82f6;--border:#E4E7EC;--gray:#EFF8FF;--text:#1a1a2e;--muted:#9AA0AC}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray);color:var(--text);min-height:100vh}
  header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(41,128,185,.4);position:sticky;top:0;z-index:100}
  .h-left{display:flex;align-items:center;gap:12px}
  .btn-back{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:5px}
  .btn-back:hover{background:rgba(255,255,255,.22)}
  .h-brand{color:white;font-size:16px;font-weight:800}
  .h-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
  .h-right{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.75);font-size:13px}
  .user-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;border:1.5px solid rgba(255,255,255,.3)}
  .main{max-width:1060px;margin:0 auto;padding:28px 20px}
  .card{background:white;border-radius:16px;padding:24px 28px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px}
  .card-title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:18px}
  label.lbl{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;letter-spacing:.5px}
  select,input[type=number],textarea{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);outline:none;background:#FAFBFC;font-family:inherit;box-sizing:border-box}
  select:focus,input:focus,textarea:focus{border-color:var(--accent)}
  .season-banner{border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:20px;border:1px solid}
  .ch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
  .ch-card{background:white;border-radius:14px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid transparent}
  .ch-card.active{border-color:var(--accent)}
  .ch-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .ch-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;color:white}
  .ch-name{font-weight:700;font-size:14px}
  .ch-freq{font-size:12px;color:#888}
  .ch-posts{font-size:12px;color:#aaa;margin-bottom:12px}
  .btn-gen{width:100%;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-gen:disabled{background:#ccc!important;color:#888!important;cursor:not-allowed}
  .gen-all-wrap{text-align:center;margin-bottom:24px}
  .btn-all{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;border:none;border-radius:12px;padding:14px 40px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(41,128,185,.35);font-family:inherit}
  .btn-all:disabled{background:#9BB5CC!important;box-shadow:none;cursor:not-allowed}
  .save-msg{margin-top:10px;color:#059669;font-size:13px;font-weight:600}
  .err-msg{margin-top:10px;color:#B42318;font-size:13px}
  .btn-history{background:rgba(26,58,92,.08);border:1px solid rgba(26,58,92,.2);color:var(--navy);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
  .history-panel{background:#F8F9FB;border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
  .tab-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .tab-btn{border:2px solid var(--border);border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:white;color:#444}
  .action-row{display:flex;gap:8px;margin-left:auto}
  .abtn{border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .strategy{background:linear-gradient(135deg,#EFF8FF,#F0FDF4);border:1px solid #93C5FD;border-radius:14px;padding:18px 22px;margin-bottom:16px}
  .strategy-title{font-weight:700;font-size:12px;color:#1d4ed8;margin-bottom:8px;letter-spacing:.5px}
  .strategy p{color:#374151;font-size:14px;line-height:1.7}
  .ef-pill{background:white;border:1px solid #93C5FD;border-radius:20px;padding:3px 12px;font-size:12px;color:#1d4ed8;font-weight:500}
  .type-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .type-badge{border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:7px;border:1px solid}
  .tbl-wrap{background:white;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.06);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{padding:11px 13px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;border-bottom:2px solid #EAECF0;background:#F8F9FB;white-space:nowrap}
  tbody tr{border-bottom:1px solid #F2F4F7}
  tbody tr:nth-child(even){background:#FAFBFC}
  td{padding:12px 13px;vertical-align:top;color:#344054}
  .tbl-foot{padding:11px 18px;background:#F8F9FB;border-top:1px solid #F0F2F5;display:flex;gap:20px;font-size:12px;color:#667085;align-items:center}
  .copy-cell{line-height:1.55;cursor:text;padding:4px 6px;border-radius:6px;transition:background .15s}
  .copy-cell:hover{background:#EFF8FF}
  .edit-area{width:100%;border:1.5px solid var(--navy2);border-radius:6px;padding:6px 8px;font-size:14px;font-family:inherit;resize:vertical;outline:none}
  .feedback-cell{min-width:180px}
  .feedback-note{font-size:12px;color:#374151;white-space:pre-wrap;padding:6px 8px;border-radius:6px;cursor:pointer;background:#FFFBEB;border:1px solid #FDE68A;margin-bottom:4px}
  .feedback-note:hover{background:#FEF3C7}
  .feedback-empty{font-size:12px;color:#bbb;font-style:italic;cursor:pointer;padding:4px 6px;border-radius:6px}
  .feedback-empty:hover{background:#FFFBEB;color:#92400E}
  .feedback-meta{font-size:10px;color:#aaa;margin-top:2px}
  .btn-rewrite{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-rewrite:disabled{opacity:.5;cursor:not-allowed}
  .general-feedback{background:white;border-radius:14px;border:1.5px solid var(--border);padding:18px 20px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .general-feedback-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:12px;text-transform:uppercase}
  .valoration-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .val-btn{border:2px solid var(--border);border-radius:20px;padding:5px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:white}
  .val-btn.aprobado{border-color:#059669;background:#D1FAE5;color:#065F46}
  .val-btn.revisar{border-color:#D97706;background:#FEF3C7;color:#92400E}
  .val-btn.rechazar{border-color:#DC2626;background:#FEE2E2;color:#991B1B}
  .btn-regen-feedback{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;border:none;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
  .btn-regen-feedback:disabled{opacity:.5;cursor:not-allowed}
  /* Brainstorming */
  .brainstorm-section{background:white;border-radius:16px;padding:24px 28px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-top:28px;border:2px solid #DDD6FE}
  .idea-card{background:#F8F9FB;border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px;transition:border-color .15s}
  .idea-card.selected{border-color:#7C3AED;background:#FAF5FF}
  .idea-card.developed{border-color:#2980B9;background:#EFF8FF}
  .idea-card.approved{border-color:#059669;background:#F0FDF4}
  .idea-title{font-weight:700;font-size:13px;color:var(--navy);margin-bottom:4px}
  .idea-desc{font-size:12px;color:#555;line-height:1.55;margin-bottom:8px}
  .idea-copy-preview{font-size:12px;color:#374151;background:#EFF8FF;border-radius:6px;padding:6px 8px;font-style:italic;line-height:1.5;margin-bottom:8px}
  .fmt-toggle-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .fmt-toggle{border:1.5px solid var(--border);border-radius:8px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:white;color:#444;transition:.15s}
  .fmt-toggle.on{border-color:#7C3AED;background:#7C3AED;color:white}
  .developed-copy{font-size:13px;color:#344054;line-height:1.65;white-space:pre-wrap;background:white;border:1.5px solid #BFDBFE;border-radius:8px;padding:12px;margin-bottom:8px;min-height:60px}
  .idea-feedback-note{font-size:12px;color:#374151;white-space:pre-wrap;padding:6px 8px;border-radius:6px;cursor:pointer;background:#FFFBEB;border:1px solid #FDE68A;margin-bottom:6px}
  .idea-feedback-empty{font-size:12px;color:#bbb;font-style:italic;cursor:pointer;padding:4px 6px;border-radius:6px}
  .idea-feedback-empty:hover{background:#FFFBEB;color:#92400E}
  @media(max-width:640px){.ch-grid{grid-template-columns:1fr}header{padding:0 16px}.main{padding:16px}}
</style>
</head>
<body>
<header>
  <div class="h-left">
    <a href="index.html" class="btn-back">← Dashboard</a>
    <div style="width:1px;height:24px;background:rgba(255,255,255,.2)"></div>
    <div class="h-brand">🦵 Área Venosa Servier</div>
    <span class="h-pill">Instagram · Facebook</span>
  </div>
  <div class="h-right">
    <div class="user-avatar" id="user-avatar"></div>
    <span id="user-name"></span>
  </div>
</header>

<div class="main">
  <div id="season-banner" class="season-banner"></div>

  <div class="card">
    <div class="card-title">Configura el mes</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">
      <div><label class="lbl">MES</label><select id="sel-month"></select></div>
      <div><label class="lbl">AÑO</label><input type="number" id="inp-year" style="width:100px"/></div>
    </div>
    <div>
      <label class="lbl">CONTEXTO ADICIONAL (opcional)</label>
      <textarea id="inp-context" rows="2" placeholder="Ej: campaña especial verano, día mundial de la flebología, promo farmacia…" style="width:100%;resize:vertical;line-height:1.5"></textarea>
    </div>
  </div>

  <div class="ch-grid" id="ch-grid"></div>

  <div class="gen-all-wrap">
    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;align-items:center">
      <button class="btn-all" id="btn-all" onclick="generateAll()">✦ Generar Feed + Stories</button>
      <button class="btn-history" onclick="toggleHistory()">🗂️ Historial <span id="hist-count" style="background:rgba(26,58,92,.15);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700"></span></button>
    </div>
    <div id="save-msg" class="save-msg"></div>
    <div id="err-msg" class="err-msg"></div>
  </div>

  <div id="history-panel" class="history-panel" style="display:none"></div>
  <div id="results"></div>

  <!-- Brainstorming creativo -->
  <div class="brainstorm-section">
    <div style="font-weight:800;font-size:15px;color:var(--navy);margin-bottom:4px">🧠 Brainstorming creativo</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Genera 5 ideas, elige el formato de cada una y desarrolla el copy. Después apruébalas e insértalas en la batería.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div>
        <label class="lbl">TEMA</label>
        <select id="bs-tema" style="width:100%">
          <option value="piernas">🦵 Piernas cansadas / pesadez</option>
          <option value="varices">🩻 Varices / insuficiencia venosa</option>
          <option value="hemorroides">💜 Hemorroides / almorranas</option>
          <option value="habitos">✅ Hábitos & consejos</option>
          <option value="awareness">💡 Awareness / desmitificación</option>
          <option value="daflon">💊 Con Daflon</option>
          <option value="verano">☀️ Verano (piscina, viajes, calor)</option>
          <option value="invierno">❄️ Invierno (dieta, estreñimiento, tabúes)</option>
        </select>
      </div>
      <div>
        <label class="lbl">ENFOQUE CREATIVO</label>
        <select id="bs-tipo" style="width:100%">
          <option value="mix">🎲 Mix variado</option>
          <option value="humor">😄 Humor / meme</option>
          <option value="awareness">💡 Awareness</option>
          <option value="reel">🎬 Reel / vídeo</option>
          <option value="stories">⭕ Stories interactivas</option>
          <option value="carrusel">📱 Carrusel educativo</option>
        </select>
      </div>
    </div>
    <button onclick="generateBrainstorm()" id="btn-bs" style="background:linear-gradient(135deg,#7C3AED,#A78BFA);color:white;border:none;border-radius:10px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">💡 Generar 5 ideas</button>
    <div id="bs-err" style="color:#B42318;font-size:13px;margin-top:8px"></div>
    <div id="bs-results" style="margin-top:16px"></div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────
const USERS=[{id:"admin",pass:"admin2026",role:"admin",name:"Administrador"},{id:"editor",pass:"editor2026",role:"editor",name:"Copywriter"}];
let currentUser=null;
try{const s=JSON.parse(localStorage.getItem("ch_session")||"null");if(s&&Date.now()-s.ts<8*3600*1000)currentUser=USERS.find(u=>u.id===s.id);}catch(_){}
if(!currentUser){window.location.href="index.html";}
else{
  document.getElementById("user-avatar").textContent=currentUser.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("user-name").textContent=currentUser.name;
}

// ── Constants ─────────────────────────────────
const STORAGE_KEY="servier_history_venosa_v2";
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function getSeason(m){return(m>=4&&m<=9)?"verano":"invierno";}
const SEASON_CONFIG={
  verano:{label:"🌞 Temporada de calor (mayo–octubre)",sub:"Foco en piernas cansadas, varices, circulación, calor, piscina y viajes.",bg:"#FFF7ED",border:"#FED7AA",color:"#C2410C"},
  invierno:{label:"❄️ Temporada de invierno (noviembre–abril)",sub:"Foco en hemorroides: causas, alivio, hábitos, dieta y tabúes.",bg:"#EFF6FF",border:"#BFDBFE",color:"#1D4ED8"},
};
const CHANNELS=[
  {id:"feed",    label:"Instagram / Facebook · Feed", icon:"📷", bg:"linear-gradient(135deg,#E1306C,#F77737)", freq:"8 posts/mes", ppm:"8 posts"},
  {id:"stories", label:"Instagram · Stories",         icon:"⭕",  bg:"linear-gradient(135deg,#833AB4,#FD1D1D,#F77737)", freq:"4 stories/mes", ppm:"4 stories"},
];
const TYPE_CONFIG={
  piernas:     {label:"Piernas cansadas", color:"#2980B9",bg:"#EFF8FF",emoji:"🦵"},
  varices:     {label:"Varices",          color:"#1a6b9e",bg:"#DBEAFE",emoji:"🩻"},
  hemorroides: {label:"Hemorroides",      color:"#7C3AED",bg:"#F5F3FF",emoji:"💜"},
  habitos:     {label:"Hábitos",          color:"#15803D",bg:"#F0FDF4",emoji:"✅"},
  awareness:   {label:"Awareness",        color:"#B45309",bg:"#FFFBEB",emoji:"💡"},
  daflon:      {label:"Daflon",           color:"#0369A1",bg:"#E0F2FE",emoji:"💊"},
};
const lenColor=(n)=>n>600?"#E63329":n>450?"#D97706":"#059669";

// ── Web Search ────────────────────────────────
const SEARCH_API_URL="https://cicero-hub-backend.onrender.com/api/search";

async function buscarURLsRelevantes(tema,area=''){
  try{
    const query=area?`${tema} ${area} noticias recientes`:`${tema} noticias recientes`;
    console.log('🔍 Buscando URLs:',query);
    const response=await fetch(SEARCH_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:query,max_results:3})
    });
    if(!response.ok){console.warn('⚠️ Búsqueda fallida');return null;}
    const data=await response.json();
    if(data.results&&data.results.length>0){
      console.log('✅ URLs encontradas:',data.results.length);
      return{
        resumen:data.answer||'',
        urls:data.results.map(r=>r.url),
        fuentes:data.results.map(r=>({
          titulo:r.title,
          url:r.url,
          extracto:r.content?r.content.substring(0,150):''
        }))
      };
    }
    return null;
  }catch(error){console.error('❌ Error en búsqueda:',error);return null;}
}

function formatearFuentesParaPrompt(fuentes){
  if(!fuentes||fuentes.length===0)return'';
  return`\n\nFUENTES ACTUALES (incluye URLs relevantes):\n${fuentes.map((f,i)=>`${i+1}. ${f.titulo}\n   ${f.url}\n   ${f.extracto}...`).join('\n\n')}`;
}

// ── Hashtag rules ─────────────────────────────
// Centralized for prompt reference:
// - Hemorroides: alterna #EnfermedadHemorroidal y #hemorroides
// - Insuficiencia venosa: #InsuficienciaVenosa
// - Con Daflon: #DaElPasoConDaflon + hashtag de patología (sin #SiénteImparable)
// - Sin Daflon: #SiénteImparable
// - Máximo 2-3 hashtags
// - OBLIGATORIO 1 post Daflon doble indicación por batería

// ── State ─────────────────────────────────────
let month=new Date().getMonth(), year=new Date().getFullYear();
let channelData={feed:null,stories:null};
let loading={feed:false,stories:false};
let history=[], activeChannel="feed", editingCopy=null, editingFeedback=null;
let generalFeedback={feed:{text:"",valoration:"",editingText:false},stories:{text:"",valoration:"",editingText:false}};
let bsGenerating=false;
// Track hashtag alternation for hemorroides
let hemorroidesHashtagIdx=0;

const selMonth=document.getElementById("sel-month");
MONTHS.forEach((m,i)=>{const o=document.createElement("option");o.value=i;o.textContent=m;selMonth.appendChild(o);});
selMonth.value=String(month);
selMonth.addEventListener("change",e=>{month=Number(e.target.value);updateSeasonBanner();});
const inpYear=document.getElementById("inp-year");
inpYear.value=String(year);
inpYear.addEventListener("change",e=>{year=Number(e.target.value)||new Date().getFullYear();});
try{history=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}catch(_){history=[];}
updateHistCount();updateSeasonBanner();renderChannelCards();

function updateSeasonBanner(){
  const s=getSeason(month);const cfg=SEASON_CONFIG[s];
  const el=document.getElementById("season-banner");
  el.style.cssText=`background:${cfg.bg};border-color:${cfg.border};color:${cfg.color};border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:20px;border:1px solid`;
  el.innerHTML=`<span style="font-size:20px">${s==="verano"?"🌞":"❄️"}</span><div><strong>${cfg.label}</strong><div style="font-weight:400;margin-top:1px;opacity:.8">${cfg.sub}</div></div>`;
}

// ── Prompts ───────────────────────────────────
const BASE_RULES=`REGLAS OBLIGATORIAS:
1. NUNCA mencionar "Daflon" en posts SIN Daflon. Si el post es tipo "daflon", puedes mencionarlo.
2. NUNCA claims terapéuticos directos. Usar "ayuda a aliviar", "puede reducir", "contribuye a mejorar".
3. Tono cercano, empático, lifestyle. Tuteo siempre.
4. CTA variados: "Consulta con tu farmacéutico", "Descubre más en daflon.es", "Guarda este post".
5. Idioma: español de España.
6. REGLAS DE HASHTAGS (máximo 2-3 por post, muy importante):
   - Posts de hemorroides: alterna entre #EnfermedadHemorroidal y #hemorroides (no uses siempre el mismo)
   - Posts de insuficiencia venosa/varices: usa #InsuficienciaVenosa
   - Posts CON Daflon (tipo daflon): usa #DaElPasoConDaflon + hashtag de patología. NO uses #SiénteImparable
   - Posts SIN Daflon: puedes usar #SiénteImparable
   - NUNCA mezcles más de 3 hashtags
7. OBLIGATORIO: incluir EXACTAMENTE 1 post de doble indicación de Daflon (piernas + hemorroides) en la batería de feed. Márcalo como tipo "daflon".`;

function buildPrompt(chId){
  const s=getSeason(month);const isSummer=(s==="verano");
  const seasonContext=isSummer

async function callAPI(chId, extraInstructions=""){
  const ch=CHANNELS.find(c=>c.id===chId);
  const ctx=document.getElementById("inp-context").value;
  
  // 🌐 BÚSQUEDA WEB AUTOMÁTICA
  let fuentesContext='';
  if(ctx){
    const busqueda=await buscarURLsRelevantes(ctx,'Área Venosa');
    if(busqueda){
      fuentesContext=formatearFuentesParaPrompt(busqueda.fuentes);
    }
  }
  
  const res=await fetch("https://cicero-hub-backend.onrender.com/api/claude",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:6000,system:buildPrompt(chId),
      messages:[{role:"user",content:`Genera el plan completo de ${ch.label} para Área Venosa Servier, mes de ${MONTHS[month]} ${year}.\n${ctx?"Contexto adicional: "+ctx:""}${fuentesContext}\n${extraInstructions?"INSTRUCCIONES DE FEEDBACK (aplícalas estrictamente): "+extraInstructions:""}\nEl campo "dia" debe ser el número del día del mes.`}]})
  });
  if(!res.ok){const e=await res.text();throw new Error("API "+res.status+": "+e);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const text=data.content?.map(i=>i.text||"").join("")||"";
  const clean=text.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  const parsed=JSON.parse(clean);
  parsed.posts=parsed.posts.map(p=>({...p,feedback:"",feedbackAuthor:"",feedbackDate:""}));
  return parsed;
}

${idea.feedback?"INSTRUCCIONES / FEEDBACK: "+idea.feedback:""}

    const data=await res.json();
    const text=data.content?.map(x=>x.text||"").join("")||"";

  }catch(e){bsIdeas[i].developed_copy="Error al desarrollar: "+e.message;}

function approveIdeaToBattery(i){
  const idea=bsIdeas[i];
  // Sync any manual edits
  const devEl=document.getElementById(`bs-devcopy-${i}`);
  const finalCopy=devEl?devEl.innerText:idea.developed_copy;
  if(!finalCopy){alert("Primero desarrolla el copy.");return;}
  const tipoMap={Feed:"feed",Reel:"feed",Stories:"stories",Carrusel:"feed"};
  const newPost={dia:1,tipo:idea.tipo_sugerido||"awareness",copy:finalCopy,multimedia:`${idea.formato_elegido} sobre: ${idea.titulo}`,fuente:"",longitud:finalCopy.length,feedback:"",feedbackAuthor:"",feedbackDate:"",sticker:idea.formato_elegido==="Stories"?"Encuesta ¿Sí/No?":undefined};
  const targetChannel=tipoMap[idea.formato_elegido]||"feed";
  if(!channelData[targetChannel]){
    channelData[targetChannel]={resumen:"Ideas del brainstorming creativo",efemerides:[],posts:[]};
  }
  channelData[targetChannel].posts.push(newPost);
  bsIdeas[i].approved=true;
  saveVersion();
  renderBsResults();
  // Show confirmation
  const msg=document.getElementById("save-msg");
  msg.textContent=`✅ Idea "${idea.titulo}" añadida a ${targetChannel==="stories"?"Stories":"Feed"}`;
  setTimeout(()=>msg.textContent="",3000);
  if(channelData[targetChannel])renderResults();
}
function unapproveIdea(i){
  // Remove from battery if present
  const idea=bsIdeas[i];
  const devEl=document.getElementById(`bs-devcopy-${i}`);
  const finalCopy=devEl?devEl.innerText:idea.developed_copy;
  ["feed","stories"].forEach(ch=>{
    if(channelData[ch])channelData[ch].posts=channelData[ch].posts.filter(p=>p.copy!==finalCopy);
  });
  bsIdeas[i].approved=false;renderBsResults();renderResults();
}

// Excel export (with fallback)
function exportExcel(){
  try{
    if(!window.XLSX){
      const allRows=[["Canal","Día","Tipo","Copy","Multimedia","Fuente","Longitud","Feedback","Autor"]];
      CHANNELS.forEach(ch=>{const d=channelData[ch.id];if(!d)return;d.posts.forEach(r=>allRows.push([ch.label,`${r.dia}/${month+1}`,TYPE_CONFIG[r.tipo]?.label||r.tipo,r.copy||"",r.multimedia||"",r.fuente||"",r.longitud,r.feedback||"",r.feedbackAuthor||""]));});
      const csv=allRows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
      const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`AreaVenosa_${MONTHS[month]}_${year}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);
      return;
    }
    const wb=window.XLSX.utils.book_new();
    CHANNELS.forEach(ch=>{
      const d=channelData[ch.id];if(!d)return;
      const isSt=ch.id==="stories";
      const hdrs=["Día","Tipo",isSt?"Sticker":"Formato","Copy","Multimedia","Fuente","Longitud","Feedback","Autor"];
      const rows=d.posts.map(r=>[`${r.dia}/${month+1}`,TYPE_CONFIG[r.tipo]?.label||r.tipo,isSt?(r.sticker||""):"Feed",r.copy||"",r.multimedia||"",r.fuente||"",r.longitud,r.feedback||"",r.feedbackAuthor||""]);
      const ws=window.XLSX.utils.aoa_to_sheet([hdrs,...rows]);
      const colW=[8,16,14,60,30,30,8,40,14];
      ws["!cols"]=colW.map(w=>({wch:w}));
      window.XLSX.utils.book_append_sheet(wb,ws,ch.label.substring(0,31));
    });
    window.XLSX.writeFile(wb,`AreaVenosa_${MONTHS[month]}_${year}.xlsx`);
  }catch(e){alert("Error al exportar: "+e.message);console.error(e);}
}

        const chs=CHANNELS.filter(c=>e.channelData[c.id]);
        const total=chs.reduce((s,c)=>s+(e.channelData[c.id]?.posts?.length||0),0);
        const date=new Date(e.createdAt).toLocaleString("es-ES",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
        const seasonIcon=e.season==="verano"?"🌞":"❄️";
        return `<div style="background:white;border:1.5px solid #E4E7EC;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div style="flex:1"><div style="font-weight:700;font-size:14px;margin-bottom:3px">${seasonIcon} ${MONTHS[e.month]} ${e.year}
            <span style="background:#EFF6FF;color:#1e40af;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600;margin-left:6px">v${e.version}</span>
            <span style="color:#aaa;font-size:11px;margin-left:4px">${total} posts</span></div>
            <div style="font-size:12px;color:#888;margin-bottom:6px">${date}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">${chs.map(c=>`<span style="font-size:11px;background:#F8F9FB;border:1px solid #E4E7EC;border-radius:8px;padding:2px 8px;color:#555">${c.icon} ${c.label.split("·")[1]?.trim()||c.label} · ${e.channelData[c.id]?.posts?.length}</span>`).join("")}</div>
          </div>
          <button onclick="loadVersion('${e.id}')" style="background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">↩ Cargar</button>
        </div>`;
      }).join("")}
    </div></div>`;
}
function loadVersion(id){
  const e=history.find(h=>h.id===id);if(!e)return;
  month=e.month;year=e.year;
  document.getElementById("sel-month").value=month;
  document.getElementById("inp-year").value=year;
  document.getElementById("inp-context").value=e.extraContext||"";
  channelData=JSON.parse(JSON.stringify(e.channelData));
  activeChannel=CHANNELS.find(c=>channelData[c.id])?.id||"feed";
  editingCopy=null;editingFeedback=null;
  document.getElementById("history-panel").style.display="none";
  updateSeasonBanner();renderChannelCards();renderResults();
}
function persistFeedback(){
  if(!history.length)return;
  history[history.length-1].channelData=JSON.parse(JSON.stringify(channelData));
  localStorage.setItem(STORAGE_KEY,JSON.stringify(history));
}

// ── Channel cards ─────────────────────────────
function renderChannelCards(){
  const grid=document.getElementById("ch-grid");grid.innerHTML="";
  const anyLoading=Object.values(loading).some(Boolean);
  CHANNELS.forEach(ch=>{
    const done=!!channelData[ch.id],isLoading=loading[ch.id];
    const btnBg=anyLoading?"#ccc":done?"#F0F4F8":ch.bg;
    const btnColor=anyLoading?"#888":done?"#344054":"white";
    const div=document.createElement("div");
    div.className="ch-card"+(activeChannel===ch.id&&done?" active":"");
    div.innerHTML=`<div class="ch-card-top">
      <div class="ch-icon" style="background:${ch.bg}">${ch.icon}</div>
      <div><div class="ch-name">${ch.label}</div><div class="ch-freq">${ch.freq}</div></div>
      ${done?'<span style="margin-left:auto;font-size:18px">✅</span>':""}
    </div>
    <div class="ch-posts">${ch.ppm}</div>
    <button class="btn-gen" style="background:${btnBg};color:${btnColor}" ${anyLoading?"disabled":""} onclick="generateSingle('${ch.id}')">
      ${isLoading?"⟳ Generando…":done?"↺ Regenerar":"✦ Generar"}
    </button>`;
    grid.appendChild(div);
  });
}
renderChannelCards();

// ── Valoration ────────────────────────────────
function setValoration(chId,val){generalFeedback[chId].valoration=generalFeedback[chId].valoration===val?"":val;renderResults();}
function editGeneralFeedback(chId){generalFeedback[chId].editingText=true;renderResults();}
function cancelGeneralFeedback(chId){generalFeedback[chId].editingText=false;renderResults();}
function saveGeneralFeedback(chId){
  const val=document.getElementById("gfb-ta")?.value||"";
  generalFeedback[chId].text=val;generalFeedback[chId].editingText=false;renderResults();
}

// ── Render results ────────────────────────────
function renderResults(){
  const container=document.getElementById("results");
  const data=channelData[activeChannel];
  if(!data){container.innerHTML="";return;}
  const activeChs=CHANNELS.filter(c=>channelData[c.id]);
  const tabsHTML=activeChs.map(ch=>{
    const isA=ch.id===activeChannel;
    const bg=isA?"linear-gradient(135deg,#E1306C,#F77737)":"white";
    return `<button class="tab-btn" style="background:${bg};color:${isA?"white":"#444"};border-color:${isA?"transparent":"#E4E7EC"}" onclick="switchChannel('${ch.id}')">${ch.icon} ${ch.label.split("·")[1]?.trim()||ch.label} (${channelData[ch.id].posts.length})</button>`;
  }).join("");
  const typeBadges=Object.entries(TYPE_CONFIG).map(([k,cfg])=>{
    const cnt=data.posts.filter(p=>p.tipo===k).length;if(!cnt)return"";
    return `<div class="type-badge" style="background:${cfg.bg};border-color:${cfg.color}33;color:${cfg.color}"><span>${cfg.emoji}</span><strong>${cnt}</strong><span style="font-size:12px;color:#666">${cfg.label}</span></div>`;
  }).join("");
  const isStories=activeChannel==="stories";
  const gfb=generalFeedback[activeChannel];
  const valBtns=["Aprobado","Revisar","Rechazar"].map(v=>{
    const cls=v==="Aprobado"?"aprobado":v==="Revisar"?"revisar":"rechazar";
    const active=gfb.valoration===v;
    return `<button class="val-btn ${active?cls:""}" onclick="setValoration('${activeChannel}','${v}')">${v==="Aprobado"?"✅":v==="Revisar"?"🔄":"❌"} ${v}</button>`;
  }).join("");
  const gfbBox=`<div class="general-feedback">
    <div class="general-feedback-title">💬 Feedback general · ${CHANNELS.find(c=>c.id===activeChannel)?.label}</div>
    <div class="valoration-row">${valBtns}</div>
    ${gfb.editingText
      ?`<textarea id="gfb-ta" rows="3" style="width:100%;border:1.5px solid #F59E0B;border-radius:8px;padding:8px;font-size:13px;font-family:inherit;resize:none;outline:none;background:#FFFBEB">${gfb.text}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button onclick="saveGeneralFeedback('${activeChannel}')" style="background:#F59E0B;color:white;border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Guardar</button>
          <button onclick="cancelGeneralFeedback('${activeChannel}')" style="background:#eee;color:#444;border:none;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit">Cancelar</button>
        </div>`
      :gfb.text
        ?`<div class="feedback-note" onclick="editGeneralFeedback('${activeChannel}')">${gfb.text}</div>`
        :`<div class="feedback-empty" onclick="editGeneralFeedback('${activeChannel}')">+ Añadir comentario general…</div>`
    }
    ${(gfb.text||gfb.valoration)&&!gfb.editingText?`<button class="btn-regen-feedback" onclick="regenWithGeneralFeedback('${activeChannel}')">↺ Regenerar con este feedback</button>`:""}
  </div>`;
  const headers=["Día","Tipo",isStories?"Sticker":"Formato","Copy","Multimedia","Fuente","Long.","💬 Feedback",""].filter(Boolean);
  const fbCount=data.posts.filter(p=>p.feedback).length;
  const rows=data.posts.map((r,i)=>{
    const cfg=TYPE_CONFIG[r.tipo]||{label:r.tipo,color:"#666",bg:"#f9f9f9",emoji:""};
    const dayLabel=`${r.dia}/${month+1}`;
    const lenC=lenColor(r.longitud);
    const copyCell=editingCopy===i
      ?`<div><textarea class="edit-area" id="edit-ta" rows="4">${r.copy}</textarea>
          <div style="display:flex;gap:6px;margin-top:4px;align-items:center">
            <span style="font-size:11px;color:${lenC}" id="edit-len">${r.longitud} chars</span>
            <button onclick="saveCopy(${i})" style="margin-left:auto;background:var(--navy);color:white;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:12px;font-family:inherit">Guardar</button>
            <button onclick="cancelEdit()" style="background:#eee;color:#444;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:12px;font-family:inherit">Cancelar</button>
          </div></div>`
      :`<div class="copy-cell" onclick="startEdit(${i})">${r.copy}</div>`;
    const fbCell=editingFeedback===i
      ?`<div><textarea id="fb-ta" rows="3" style="width:100%;border:1.5px solid #F59E0B;border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;resize:none;outline:none;background:#FFFBEB">${r.feedback||""}</textarea>
          <div style="display:flex;gap:6px;margin-top:4px">
            <button onclick="saveFeedback(${i})" style="background:#F59E0B;color:white;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">Guardar</button>
            <button onclick="cancelFeedback()" style="background:#eee;color:#444;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:11px;font-family:inherit">Cancelar</button>
          </div></div>`
      :`<div>${r.feedback
          ?`<div class="feedback-note" onclick="editingFeedback=${i};renderResults()">${r.feedback}</div>
             <div class="feedback-meta">✍️ ${r.feedbackAuthor} · ${r.feedbackDate}</div>
             <button class="btn-rewrite" id="rewrite-btn-${i}" onclick="rewriteSingleCopy(${i})">↺ Rehacer con feedback</button>`
          :`<div class="feedback-empty" onclick="editingFeedback=${i};renderResults()">+ Añadir nota</div>`}
       </div>`;
    const fuente=r.fuente?`<a href="${r.fuente}" target="_blank" rel="noreferrer" style="color:#0066CC;text-decoration:none;word-break:break-all;font-size:12px">${r.fuente.replace(/^https?:\/\//,"").substring(0,28)}…</a>`:`<span style="color:#ddd">—</span>`;
    const col3=isStories
      ?`<span style="background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">${r.sticker||"—"}</span>`
      :`<span style="background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">Feed</span>`;
    return `<tr>
      <td style="font-weight:700;color:var(--navy);width:40px">${dayLabel}</td>
      <td style="width:130px"><span style="background:${cfg.bg};color:${cfg.color};border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;white-space:nowrap">${cfg.emoji} ${cfg.label}</span></td>
      <td style="width:120px">${col3}</td>
      <td style="max-width:300px">${copyCell}</td>
      <td style="font-size:12px;color:#5A67D8;width:150px">${r.multimedia||'<span style="color:#ddd">—</span>'}</td>
      <td style="width:150px">${fuente}</td>
      <td style="width:48px"><span style="font-weight:700;font-size:13px;color:${lenC}">${r.longitud}</span></td>
      <td class="feedback-cell">${fbCell}</td>
      <td style="width:30px"><button onclick="startEdit(${i})" style="background:none;border:none;cursor:pointer;font-size:15px">✏️</button></td>
    </tr>`;
  }).join("");
  container.innerHTML=`
    <div class="tab-row">
      ${tabsHTML}
      <div class="action-row">
        <button class="abtn" style="background:#F4F6F9;color:#344054" onclick="copyTable()">📋 Copiar</button>
        <button class="abtn" style="background:#217346;color:white" onclick="exportExcel()">⬇ Excel</button>
      </div>
    </div>
    <div class="strategy"><div class="strategy-title">📋 ESTRATEGIA · ${CHANNELS.find(c=>c.id===activeChannel)?.label.toUpperCase()}</div>
      <p>${data.resumen}</p>
      ${data.efemerides?.length?`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px">${data.efemerides.map(ef=>`<span class="ef-pill">📅 ${ef}</span>`).join("")}</div>`:""}
    </div>
    ${gfbBox}
    <div class="type-row">${typeBadges}
      ${fbCount?`<div style="margin-left:auto;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:6px 14px;font-size:12px;color:#92400E;font-weight:600">💬 ${fbCount} nota${fbCount>1?"s":""}</div>`:""}
    </div>
    <div class="tbl-wrap"><div style="overflow-x:auto">
      <table id="main-table">
        <thead><tr>${headers.map(h=>`<th>${h.toUpperCase()}</th>`).join("")}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="tbl-foot"><span>🟢 óptimo</span><span>🟡 aceptable</span><span>🔴 revisar longitud</span>
      <span style="margin-left:auto;color:#bbb">✏️ editar copy · 💬 añadir nota · ↺ rehacer</span>
    </div></div>`;
  setTimeout(()=>{
    const ta=document.getElementById("edit-ta");
    if(ta)ta.addEventListener("input",()=>{const el=document.getElementById("edit-len");if(el){el.textContent=ta.value.length+" chars";el.style.color=lenColor(ta.value.length);}});
  },50);
}
function switchChannel(chId){activeChannel=chId;editingCopy=null;editingFeedback=null;renderChannelCards();renderResults();}
function startEdit(i){editingCopy=i;editingFeedback=null;renderResults();}
function cancelEdit(){editingCopy=null;renderResults();}
function saveCopy(i){
  const val=document.getElementById("edit-ta")?.value||"";
  channelData[activeChannel].posts[i].copy=val;channelData[activeChannel].posts[i].longitud=val.length;
  editingCopy=null;renderResults();
}
function saveFeedback(i){
  const val=document.getElementById("fb-ta")?.value||"";
  channelData[activeChannel].posts[i].feedback=val;
  channelData[activeChannel].posts[i].feedbackAuthor=currentUser.name;
  channelData[activeChannel].posts[i].feedbackDate=new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
  editingFeedback=null;persistFeedback();renderResults();
}
function cancelFeedback(){editingFeedback=null;renderResults();}
function copyTable(){
  const tbl=document.getElementById("main-table");if(!tbl)return;
  const r=document.createRange();r.selectNode(tbl);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand("copy");window.getSelection().removeAllRanges();
  const b=document.querySelector('[onclick="copyTable()"]');const orig=b.textContent;b.textContent="✓ Copiado";setTimeout(()=>b.textContent=orig,2000);
}

</script>
</body>
</html>
